name: Feature request
description: Share an idea for city2graph, even if it is still taking shape
title: '[Feature]: '
labels: [enhancement]
assignees: ['']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea! Early-stage suggestions are welcome, and you
        do not need to design the API or implementation before opening an issue.
  - type: textarea
    id: idea
    attributes:
      label: What would you like city2graph to do?
      description: Describe the feature or improvement in your own words.
      placeholder: It would be helpful if city2graph could ...
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: What would this help you accomplish?
      description: Share the use case or problem behind the request, if applicable.
  - type: textarea
    id: solution
    attributes:
      label: Do you have a preferred solution?
      description: A rough workflow, example, or desired behaviour is enough.
  - type: textarea
    id: alternatives
    attributes:
      label: Are there alternatives or workarounds?
      description: Tell us what you use today, if anything.
  - type: textarea
    id: api
    attributes:
      label: API ideas
      description: Include an API sketch if you have one. This is completely optional.
      render: python
  - type: dropdown
    id: contribution
    attributes:
      label: Would you be interested in helping with this?
      options:
        - 'Yes'
        - Maybe, with guidance
        - Not at the moment
        - Not sure
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Add links, examples, screenshots, or other context.
