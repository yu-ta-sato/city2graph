name: Bug report
description: Tell us about unexpected behaviour, even if you do not have every detail
title: '[Bug]: '
labels: [bug]
assignees: ['']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve city2graph!

        Please share what you know, even if the report is incomplete. We can ask
        follow-up questions if more information is needed. Checking the
        [documentation](https://city2graph.net) and existing issues can be helpful,
        but it is not required.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Tell us about the problem in as much or as little detail as you have.
      placeholder: I expected ... but instead ...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Steps, sample data, or a small code example are all useful if available.
      placeholder: |
        1. Run ...
        2. Call ...
        3. See ...
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: If it is not already clear above, describe the result you expected.
  - type: textarea
    id: logs
    attributes:
      label: Logs or error messages
      description: Paste any relevant traceback or error output here.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share whichever details are relevant and easy to find.
      value: |
        - OS:
        - Python version:
        - city2graph version:
        - Other relevant package versions:
  - type: dropdown
    id: installation
    attributes:
      label: How did you install city2graph?
      options:
        - PyPI (pip)
        - conda-forge (conda or mamba)
        - Source or editable checkout
        - Not sure
        - Other
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Add screenshots, links, sample files, or any other helpful context.
