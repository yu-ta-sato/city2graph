
[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "city2graph"
version = "0.1.0"
description = "A library that converts Overture Maps data into a graph representation using NetworkX"
dependencies = [
    "networkx",
    "shapely",
    "geopandas",
    "torch_geometric"
]